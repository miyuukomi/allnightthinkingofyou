<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡ track order</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
      
        .track-hero {
            text-align: center;
            max-width: 650px;
            margin: 4.5rem auto 3rem auto;
            padding: 0 2rem;
        }

        .track-hero h1 {
            font-size: 1.8rem; 
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 0.6rem;
            color: var(--text-sepia); 
            text-transform: lowercase;
            letter-spacing: -0.01em;
        }

        .track-hero p {
            font-style: italic;
            font-size: 0.9rem; 
            color: var(--text-light-sepia);
            opacity: 0.85;
        }

        .luxury-search-input-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #ffffff;
            border: 1px solid var(--border-soft);
            border-radius: 0px;
            max-width: 450px; 
            margin: 0 auto;
            padding: 0.5rem 1.2rem;
            box-shadow: 0 8px 24px rgba(107, 90, 80, 0.03);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .luxury-search-input-wrapper:focus-within {
            border-color: var(--accent-rose);
            box-shadow: 0 10px 28px rgba(195, 121, 125, 0.06);
            transform: translateY(-1px);
        }

        .luxury-input {
            flex: 1;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            font-size: 1rem; 
            font-family: 'Baskervville', serif;
            color: var(--text-sepia);
            padding: 0.3rem 0;
            -webkit-appearance: none;
            appearance: none;
        }

        .luxury-input::placeholder {
            color: var(--text-light-sepia);
            opacity: 0.45;
            font-style: italic;
        }

        .luxury-track-btn {
            background: none !important;
            border: none !important;
            outline: none !important;
            font-family: 'Baskervville', serif;
            font-size: 0.9rem;
            font-style: italic;
            color: var(--text-sepia);
            cursor: pointer;
            padding-left: 1.2rem;
            opacity: 0.7;
            transition: all 0.25s ease;
        }

        .luxury-track-btn:hover { 
            color: var(--accent-rose);
            opacity: 1; 
        }

        #tracking-output-stage {
            max-width: 550px;
            margin: 2.5rem auto 0 auto;
            padding: 0 1.5rem;
        }

        .white-manifest-card {
            background-color: #ffffff;
            border: 1px solid var(--border-soft);
            border-radius: 1px;
            padding: 2rem 1.8rem;
            box-shadow: 0 12px 35px rgba(107, 90, 80, 0.04);
            animation: cardReveal 0.6s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

  /* the name is so stupid LOL*/
        .luxury-timeline {
            list-style: none;
            position: relative;
            padding-left: 0;
            margin: 1.5rem 0 0.5rem 0;
        }

        .luxury-timeline::before {
            content: '';
            position: absolute;
            left: 12px; 
            top: 12px;
            bottom: 12px;
            width: 1px;
            background: var(--border-soft);
            z-index: 1;
        }

        .timeline-node {
            display: flex;
            align-items: flex-start;
            position: relative;
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(12px);
            animation: nodeReveal 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .timeline-node:last-child {
            margin-bottom: 0;
        }

        @keyframes nodeReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .node-heart-marker {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px; 
            margin-top: 1px;
            flex-shrink: 0;
            z-index: 2;
            user-select: none;
        }

        .node-heart-marker .heart-svg {
            width: 12px; 
            height: 12px;
            fill: var(--accent-rose);
            opacity: 0.25;
            transition: all 0.4s ease;
        }

        .timeline-node.passed-step {
            opacity: 0.55 !important;
        }
        .timeline-node.passed-step .heart-svg {
            opacity: 0.5;
            fill: var(--text-light-sepia);
        }

        .timeline-node.current-step {
            opacity: 1 !important;
        }
        
        .timeline-node.current-step .heart-svg {
            opacity: 1;
            fill: var(--accent-rose);
            filter: drop-shadow(0 0 5px rgba(195, 121, 125, 0.4)) drop-shadow(0 0 10px rgba(195, 121, 125, 0.15));
            animation: smoothBoutiqueBreath 4s ease-in-out infinite;
            will-change: transform, opacity;
        }

        @keyframes smoothBoutiqueBreath {
            0%, 100% { transform: scale(0.95); opacity: 0.85; }
            50% { transform: scale(1.35); opacity: 1; }
        }

      
        .node-content h4 {
            font-size: 0.95rem; 
            font-weight: 400;
            text-transform: lowercase;
            color: var(--text-sepia);
            line-height: 1.4;
        }
        
        .timeline-node.current-step .node-content h4 {
            color: var(--accent-rose);
            font-weight: 400; 
            font-style: italic; 
        }
    </style>
</head>
<body>

    <header id="global-header" class="site-header fade-up"></header>

    <main class="main-container fade-up delay-1">
        <div class="track-hero">
            <h1>trace your order ♡</h1>
            <p>please enter your tracking number ( ⸝⸝´ ᵕ `⸝⸝) </p>
        </div>
        
        <div class="luxury-search-input-wrapper">
            <input type="text" id="tracking-input" class="luxury-input" placeholder="e.g., love-xxx-xxx-xxxx" autocomplete="off" spellcheck="false">
            <button class="luxury-track-btn" onclick="executeParcelLookup()">❤︎⁠</button>
        </div>

        <section id="tracking-output-stage"></section>
    </main>

    <footer class="site-footer fade-up delay-2">
        <p>allnightthinkingofyou@outlook.com ❤︎⁠ located in yangon, myanmar</p>
    </footer>

    <script>
        const GIST_API_URL = 'https://api.github.com/gists/ca5d21e00e393f5d4bd1d1f2936f4305';

        const TRACKING_PIPELINE = [
            { id: "placed", label: "order placed" },
            { id: "purchased", label: "purchased" },
            { id: "warehouse", label: "arrived at warehouse" },
            { id: "transit", label: "in transit to myanmar" },
            { id: "yangon", label: "arrived in yangon" },
            { id: "outfordelivery", label: "out for delivery" },
            { id: "delivered", label: "delivered" }
        ];

        async function initializeGlobalHeader() {
            const headerContainer = document.getElementById('global-header');
            if (!headerContainer) return;
            try {
                const response = await fetch('header.html'); 
                if (!response.ok) throw new Error('Header resource load failed');
                const headerHtmlContent = await response.text();
                headerContainer.innerHTML = headerHtmlContent;
                
                let currentFilename = window.location.pathname.split('/').pop().toLowerCase();
                if (currentFilename === "" || !currentFilename) currentFilename = "index.html";
                
                const navLinks = headerContainer.querySelectorAll('.nav-btn');
                navLinks.forEach(link => {
                    const dataPage = link.getAttribute('data-page');
                    if (dataPage && dataPage.toLowerCase() === currentFilename) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });

                const hoverZone = headerContainer.querySelector('.sidebar-hover-zone');
                const trigger = headerContainer.querySelector('.sidebar-trigger');
                if (trigger && hoverZone) {
                    trigger.addEventListener('click', (e) => {
                        e.stopPropagation();
                        hoverZone.classList.toggle('open');
                    });
                    document.addEventListener('click', (e) => {
                        if (!hoverZone.contains(e.target)) {
                            hoverZone.classList.remove('open');
                        }
                    });
                }
            } catch (error) { console.error('Error loading header:', error); }
        }
        document.addEventListener('DOMContentLoaded', initializeGlobalHeader);

        
        function getSpreadsheetNote(record, stepId) {
            const targetColumnKey = ("note" + stepId).toLowerCase();
            for (let key in record) {
                if (key.toLowerCase() === targetColumnKey) {
                    return record[key] ? String(record[key]).trim() : "";
                }
            }
            return "";
        }

        async function executeParcelLookup() {
            const searchField = document.getElementById('tracking-input');
            const outputStage = document.getElementById('tracking-output-stage');
            const rawInput = searchField.value.trim();

            if (!rawInput) {
                outputStage.innerHTML = `<p style="text-align:center; font-size:0.85rem; font-style:italic; color: var(--text-light-sepia); opacity:0.6; padding-top:2rem;">please enter a tracking identification sequence ♡ </p>`;
                return;
            }

            outputStage.innerHTML = `<p style="text-align:center; font-size:0.85rem; font-style:italic; color: var(--text-light-sepia); opacity:0.6; padding-top:2rem;">please wait ♡</p>`;
            const sanitizedLookupKey = rawInput.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();

            try {
                const response = await fetch(GIST_API_URL + '?nocache=' + new Date().getTime());
                if (!response.ok) throw new Error("unavailable ♡ ");
                
                const gistWrapper = await response.json();
                const remoteDatabase = JSON.parse(gistWrapper.files["orders.json"].content);
                
                const matchedRecord = remoteDatabase.find(record => {
                    if (!record.trackingCode) return false;
                    const normalizedRecordKey = String(record.trackingCode).replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
                    return normalizedRecordKey === sanitizedLookupKey;
                });

                if (!matchedRecord) {
                    outputStage.innerHTML = `
                        <p style="text-align:center; font-size:0.9rem; font-style:italic; color: var(--text-sepia); opacity:0.8; padding-top:2rem;">
                            we cannot find your tracking code ( • ᴖ • ｡) 
                            <br><span style="font-size: 0.8rem; opacity: 0.5; font-style: normal; color: var(--text-light-sepia);">are you sure it's correct?</span>
                        </p>`;
                    return;
                }

                const sheetStatusRaw = String(matchedRecord.status).trim().toLowerCase();
                const pipelineLabels = TRACKING_PIPELINE.map(p => p.label);
                let currentMilestoneIndex = pipelineLabels.indexOf(sheetStatusRaw);
                
                if (currentMilestoneIndex === -1 && sheetStatusRaw !== "") {
                    if (sheetStatusRaw.includes("delivered")) currentMilestoneIndex = 6;
                    else if (sheetStatusRaw.includes("outfordelivery") || sheetStatusRaw.includes("delivered")) currentMilestoneIndex = 5;
                    else if (sheetStatusRaw.includes("yangon")) currentMilestoneIndex = 4;
                    else if (sheetStatusRaw.includes("transit") || sheetStatusRaw.includes("route")) currentMilestoneIndex = 3;
                    else if (sheetStatusRaw.includes("arrived") || sheetStatusRaw.includes("warehouse")) currentMilestoneIndex = 2;
                    else if (sheetStatusRaw.includes("purchased") || sheetStatusRaw.includes("bought")) currentMilestoneIndex = 1;
                    else if (sheetStatusRaw.includes("placed") || sheetStatusRaw.includes("ordered")) currentMilestoneIndex = 0;
                    else currentMilestoneIndex = 0; 
                }

                let structuralTimelineMarkup = `<ul class="luxury-timeline">`;
                
                TRACKING_PIPELINE.forEach((step, stepIdx) => {
                    let contextualStateClass = "timeline-node";

                    if (stepIdx < currentMilestoneIndex) {
                        contextualStateClass += " passed-step";
                    } else if (stepIdx === currentMilestoneIndex) {
                        contextualStateClass += " current-step";
                    }

                    let descriptiveSubtext = getSpreadsheetNote(matchedRecord, step.id);
                    let stepDelayTime = (stepIdx * 0.12) + "s";

                    structuralTimelineMarkup += `
                        <li class="${contextualStateClass}" style="animation-delay: ${stepDelayTime};">
                            <div class="node-heart-marker">
                                <svg class="heart-svg" viewBox="0 0 24 24">
                                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                </svg>
                            </div>
                            <div class="node-content">
                                <h4>${stepIdx === currentMilestoneIndex ? matchedRecord.status : step.label}</h4>
                                ${descriptiveSubtext ? `<p style="font-style: italic; margin-top: 0.15rem; opacity: 0.65; font-size: 0.8rem; color: var(--text-light-sepia);">${descriptiveSubtext}</p>` : ''}
                            </div>
                        </li>
                    `;
                });
                
                structuralTimelineMarkup += `</ul>`;

               
                outputStage.innerHTML = `
                    <div class="white-manifest-card">
                        <div class="order-meta-card" style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-soft); padding-bottom: 1rem;">
                            <h2 style="font-size: 1.25rem; font-weight: 400; color: var(--text-sepia); text-transform: lowercase; letter-spacing: -0.01em;"> your tracking code is ♡ ${matchedRecord.trackingCode}</h2>
                            <span style="font-size:0.8rem; color: var(--text-light-sepia); opacity:0.6; font-style: italic;">last updated: ${matchedRecord.lastdate || 'recently'} ${matchedRecord.lasttime ? `at ${matchedRecord.lasttime}` : ''}</span>
                        </div>
                        ${structuralTimelineMarkup}
                    </div>
                `;
            } catch (err) {
                console.error(err);
                outputStage.innerHTML = `
                    <p style="text-align:center; font-style:italic; font-size: 0.9rem; color: var(--text-sepia); opacity: 0.8; padding-top:2rem;">
                        network connection issue. 
                        <br><span style="font-size: 0.8rem; font-style: normal; opacity: 0.6; color: var(--text-light-sepia);">could not retrieve data securely.</span>
                    </p>`;
            }
        }

        document.getElementById('tracking-input').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                executeParcelLookup();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            initializeGlobalHeader();

            const URL_PARAMETERS = new URLSearchParams(window.location.search);
            const DIRECT_TRACKING_CODE = URL_PARAMETERS.get('code') || URL_PARAMETERS.get('trackingCode');
            
            if (DIRECT_TRACKING_CODE) {
                const searchField = document.getElementById('tracking-input');
                searchField.value = DIRECT_TRACKING_CODE;
                executeParcelLookup();
            }
        });
    </script>
</body>
</html>
